{% extends 'base.html' %}
{% load static %}
<title>{% block title %}Departments{% endblock %}</title>
{% block extra_css %}
<link rel="stylesheet" href="{% static 'departments.css' %}">
{% endblock %}

{% block content %}
<section class="container my-5">
  <h2 class="text-center mb-4">Our Departments</h2>
  
  <div class="row">
    <div class="department-card">

    {% for dept in departments %}
    <div class="col-md-4 mb-3">
      <div class="card p-3 text-center">
        <h5>{{ dept.name }}</h5>
        <p>{{ dept.description }}</p>
      </div>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
