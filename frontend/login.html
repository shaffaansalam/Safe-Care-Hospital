<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


<link rel="stylesheet" href="navbar.css">
<link rel="stylesheet" href="footer.css">
<link rel="stylesheet" href="home.css">

  <!-- Axios CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen grid grid-rows-[auto_1fr_auto]">

  <header class="bg-white shadow-md px-10 py-4 flex justify-between items-center z-50">
    <div class="flex flex-col">
      <span class="text-blue-600 font-bold text-2xl leading-none">SAFE CARE</span>
      <span class="text-blue-600 font-bold text-lg">Hospital</span>
    </div>
    <nav>
      <ul class="flex items-center gap-6 list-none m-0">
        <li><a href="{% url 'home' %}" class="text-blue-600 font-medium hover:text-blue-800 no-underline">Home</a></li>
        <li><a href="{% url 'about' %}" class="text-blue-600 font-medium hover:text-blue-800 no-underline">About</a></li>
        <li><a href="{% url 'departments' %}" class="text-blue-600 font-medium hover:text-blue-800 no-underline">Departments</a></li>
        <li><a href="{% url 'contact' %}" class="text-blue-600 font-medium hover:text-blue-800 no-underline">Contact</a></li>
        <li><a href="{% url 'login' %}" class="text-blue-600 font-medium hover:text-blue-800 no-underline">Login</a></li>
        <li><a href="{% url 'authentication:register' %}" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition no-underline text-sm">Register</a></li>
      </ul>
    </nav>
  </header>

  <main class="flex items-center justify-center p-6">
    
    <div class="bg-white pb-1 p-2 rounded-xl shadow-xl w-full max-w-md border border-gray-100">
      <h2 class="text-2xl font-bold text-center mb-3 text-gray-800">Login</h2>

      <p id="errorMsg" class="text-red-600 text-sm mb-4 hidden bg-red-50 p-2 rounded text-center"></p>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
          <input type="email" id="email" required
            class="w-full px-4 py-3 bg-blue-50 border border-blue-100 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"/>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
          <input type="password" id="password" required
            class="w-full px-4 py-3 bg-blue-50 border border-blue-100 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"/>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-95">
          Login
        </button>
      </form>
    </div>
  </main>

  <footer class="bg-blue-600 text-white py-6 text-center">
    <p class="mb-3 font-medium">© 2025 Safe Care Hospital | All Rights Reserved</p>
    <div class="flex justify-center gap-6 text-xl">
      <i class="fab fa-facebook hover:scale-110 transition cursor-pointer"></i>
      <i class="fab fa-instagram hover:scale-110 transition cursor-pointer"></i>
      <i class="fab fa-linkedin hover:scale-110 transition cursor-pointer"></i>
    </div>
  </footer>

</body>

 

  

   


  <script>
    const loginForm = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      errorMsg.classList.add("hidden");

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const response = await axios.post(
          "http://127.0.0.1:8001/login/",
          {
            email: email,
            password: password
          }
        );

        // ✅ Save tokens in localStorage
        localStorage.setItem("access_token", response.data.access);
        localStorage.setItem("refresh_token", response.data.refresh);
        localStorage.setItem("user", JSON.stringify(response.data.user));
          console.log(response.data.user);
          
        // ✅ Redirect to home page
        window.location.href = "http://127.0.0.1:8001/home/";

      } catch (error) {
        errorMsg.classList.remove("hidden");

        if (error.response && error.response.data) {
          errorMsg.innerText = error.response.data.detail || "Invalid login credentials";
        } else {
          errorMsg.innerText = "Something went wrong. Please try again.";
        }
      }
    });
  </script>

</body>
</html>
