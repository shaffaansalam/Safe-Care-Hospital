<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="navbar.css" />
    <link rel="stylesheet" href="footer.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <header class="navbar fixed-top px-5">
      <div class="left-logo">
        SAFE CARE
        <div class="down">Hospital</div>
      </div>
      <nav>
        <ul class="nav-links">
          <li><a href="home.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="departments.html">Departments</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="login.html">Login</a></li>
          <li>
            <a href="register.html" class="btn btn-primary btn-sm text-white text-sm"
              >Register</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <div class="navbar-space"></div>

    <div class="auth-wrapper">
<div class="auth-box" style="max-width: 600px;">
  <h3>Create Account</h3>
  
  <div class="d-flex justify-content-center mb-4">
    <div class="btn-group" role="group">
      <input type="radio" class="btn-check" name="roleToggle" id="rolePatient" value="patient" checked>
      <label class="btn btn-outline-primary" for="rolePatient">Register as Patient</label>

      <input type="radio" class="btn-check" name="roleToggle" id="roleDoctor" value="doctor">
      <label class="btn btn-outline-primary" for="roleDoctor">Register as Doctor</label>
    </div>
  </div>

  <form id="registerForm" novalidate>
    <div class="row">
      <div class="col-md-6">
        <input id="firstName" class="form-control mb-1" placeholder="First Name" />
        <div class="text-danger small mb-2" id="firstNameError"></div>
      </div>
      <div class="col-md-6">
        <input id="lastName" class="form-control mb-1" placeholder="Last Name" />
        <div class="text-danger small mb-2" id="lastNameError"></div>
      </div>
    </div>

    <input id="email" class="form-control mb-1" placeholder="Email" />
    <div class="text-danger small mb-2" id="emailError"></div>

    <input id="password" class="form-control mb-1" type="password" placeholder="Password" />
    <div class="text-danger small mb-2" id="passwordError"></div>

    <hr>

    <div id="patientFields">
      <!-- <h5 class="text-muted">Patient Details</h5> -->
      <div class="row">
        <div class="col-md-6">
          <input id="phone" class="form-control mb-1" placeholder="Phone Number" />
        </div>
        <div class="col-md-6">
          <select id="gender" class="form-control mb-1">
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div class="row mt-2">
        <div class="col-md-6">
          <label class="small">Date of Birth</label>
          <input id="dob" type="date" class="form-control mb-1" />
        </div>
        <div class="col-md-6">
          <label class="small">Blood Group</label>
          <input id="bloodGroup" class="form-control mb-1" placeholder="e.g. O+" />
        </div>
      </div>
      <div class="text-danger small" id="patientError"></div>
    </div>

    <div id="doctorFields" style="display:none;">
      <!-- <h5 class="text-muted">Doctor Details</h5> -->
      <input id="specialization" class="form-control mb-1" placeholder="Specialization" />
      <input id="qualification" class="form-control mb-1" placeholder="Qualification" />
      <div class="row">
        <div class="col-md-6">
          <input id="experience" type="number" class="form-control mb-1" placeholder="Years of Experience" />
        </div>
        <div class="col-md-6">
          <input id="fee" type="number" class="form-control mb-1" placeholder="Consultation Fee" />
        </div>
      </div>
      <div class="alert alert-warning small mt-2">
        <strong>Note:</strong> Your account will require Admin approval before you can log in.
      </div>
      <div class="text-danger small" id="doctorError"></div>
    </div>

    <button type="submit" class="btn btn-success w-100 mt-4">Register</button>
  </form>
</div>
    </div>

    <footer class="footer text-center">
      <p>© 2025 Safe Care Hospital | All Rights Reserved</p>
      <div>
        <i class="fab fa-facebook"></i>
        <i class="fab fa-instagram"></i>
        <i class="fab fa-linkedin"></i>
      </div>
    </footer>


<script src="register.js"></script>
  </body>
</html>
